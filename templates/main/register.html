{% extends "base.html" %}
{% block title %}Реєстрація — GameStore{% endblock %}
{% block content %}
<h1 class="text-info text-uppercase mb-4">Реєстрація</h1>
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form.as_p }}
          <div class="d-grid gap-2">
            <button class="btn btn-info" type="submit">Створити акаунт</button>
            <a class="btn btn-outline-light" href="{% url 'login' %}">У мене вже є акаунт</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
