{% extends "base.html" %}
{% block title %}Відновлення паролю — запит{% endblock %}
{% block content %}
<h1 class="text-info text-uppercase mb-4">Відновлення паролю</h1>
<p class="text-secondary">Введіть email вашого акаунта. Ми надішлемо тимчасовий код для зміни паролю.</p>
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" name="email" id="email" required class="form-control bg-dark text-white border-secondary" placeholder="you@example.com">
          </div>
          <div class="d-grid">
            <button class="btn btn-info" type="submit">Надіслати код</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
