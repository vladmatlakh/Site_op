{% extends "base.html" %}
{% block title %}Підтвердження відновлення паролю{% endblock %}
{% block content %}
<h1 class="text-info text-uppercase mb-4">Зміна паролю</h1>
<p class="text-light">Введіть email, код з листа та новий пароль.</p>
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="email" class="form-label text-light">Email</label>
            <input type="email" name="email" id="email" required class="form-control bg-dark text-white border-secondary" placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label for="code" class="form-label text-light">Код підтвердження</label>
            <input type="text" name="code" id="code" required class="form-control bg-dark text-white border-secondary" placeholder="Напр., ABC123">
          </div>
          <div class="mb-3">
            <label for="new_password" class="form-label text-light">Новий пароль</label>
            <input type="password" name="new_password" id="new_password" required class="form-control bg-dark text-white border-secondary" minlength="8">
          </div>
          <div class="d-grid">
            <button class="btn btn-info" type="submit">Змінити пароль</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
