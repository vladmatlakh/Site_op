{% extends "base.html" %}
{% block title %}Увійти — GameStore{% endblock %}
{% block content %}
<h1 class="text-info text-uppercase mb-4">Увійти</h1>
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="card bg-dark border-secondary">
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
          {% endif %}
          {{ form.as_p }}
          <div class="d-grid gap-2">
            <button class="btn btn-info" type="submit">Увійти</button>
            <a class="btn btn-outline-light" href="{% url 'register' %}">Створити акаунт</a>
            <a class="btn btn-outline-secondary" href="{% url 'password_reset_request' %}">Забули пароль?</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
